services:
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    #network_mode: host
    ports:
     - "53:53/tcp"
     - "53:53/udp"
     - "80:80/tcp"
    dns:
      - 1.1.1.1 # Cloudflare
      - 8.8.8.8 # Google
    environment:
      TZ: 'Asia/Ho_Chi_Minh' # Change to your timezone
      FTLCONF_webserver_api_password: '[your shit here]'
      FTLCONF_dns_listeningMode: 'all'
    volumes:
      - 'pihole_config:/etc/pihole'
      - 'dnsmasq_config:/etc/dnsmasq.d'
    restart: unless-stopped

volumes:
  pihole_config:
  dnsmasq_config: