services:
  warp:
    image: caomingjun/warp
    container_name: warp
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "9099:9099"           # qBittorrent Web UI
      - "6881:6881"           # qBittorrent TCP
      - "6881:6881/udp"       # qBittorrent UDP
      - "6080:6080"           # Soulseek Web UI (HTTP)
      - "6081:6081"           # Soulseek Web UI (HTTPS)
      - "5030:5030"           # slskd HTTP
      - "5031:5031"           # slskd HTTPS
      - "50300:50300"         # slskd Soulseek Protocol

  qbittorrent1:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent1
    network_mode: "service:warp"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Ho_Chi_Minh_City
      - WEBUI_PORT=9099
      - TORRENTING_PORT=6881
      - QBT_EULA=accept
      - QBT_VERSION=latest
    volumes:
      - bitorrentnifggfdata:/config
      - [your shit here]:/downloads
    restart: unless-stopped
    tty: true
    depends_on:
      - warp

  soulseek:
    image: realies/soulseek:latest
    container_name: soulseek
    network_mode: "service:warp"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Ho_Chi_Minh_City
    volumes:
      - soulseek_config:/data/.SoulseekQt
      - [your shit here]:/data/output
    restart: unless-stopped
    depends_on:
      - warp
  slskd:
    image: slskd/slskd
    container_name: slskd
    network_mode: "service:warp"
    environment:
      - SLSKD_REMOTE_CONFIGURATION=true
    volumes:
      - slskd_data:/app
      - [your shit here]:/music # Added for downloads
    restart: always
    depends_on:
      - warp

volumes:
  bitorrentnifggfdata:
  soulseek_config:
  slskd_data: