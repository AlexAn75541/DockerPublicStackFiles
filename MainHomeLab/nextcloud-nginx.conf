upstream php-handler {
    server nextcloud:9000;
}

# Serve .mjs files with correct MIME type (JavaScript modules support)
types {
    application/javascript mjs;
}

server {
    listen 80;
    server_name _;

    root /var/www/html;
    client_max_body_size 0;
    client_body_buffer_size 512k;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;

    # Security headers (Caddy upstream handles HSTS/SSL headers)
    add_header X-Content-Type-Options    nosniff always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header X-Robots-Tag              "noindex, nofollow" always;
    add_header X-Download-Options        noopen always;
    add_header X-Permitted-Cross-Domain-Policies none always;
    add_header Referrer-Policy           no-referrer always;
    add_header X-Frame-Options           "SAMEORIGIN" always;

    gzip on;
    gzip_vary on;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_proxied expired no-cache no-store private no_last_modified no_etag auth;
    gzip_types
        application/atom+xml application/javascript application/json
        application/ld+json application/manifest+json application/rss+xml
        application/vnd.ms-fontobject application/x-font-ttf application/xhtml+xml
        application/xml font/opentype image/svg+xml image/x-icon
        text/css text/plain text/vcard;

    location = /robots.txt  { allow all; log_not_found off; access_log off; }

    # Well-known redirects
    location ^~ /.well-known {
        location = /.well-known/carddav   { return 301 /remote.php/dav; }
        location = /.well-known/caldav    { return 301 /remote.php/dav; }
        location = /.well-known/webfinger { return 301 /index.php/.well-known/webfinger; }
        location = /.well-known/nodeinfo  { return 301 /index.php/.well-known/nodeinfo; }
        return 301 /index.php$request_uri;
    }

    # Block access to sensitive directories
    location ~ ^/(build|tests|config|lib|3rdparty|templates|data)/ { deny all; }
    location ~ ^/(\.|autotest|occ|issue|indie|db_|console)          { deny all; }

    # Core Entry point mapping fix
    location / {
        try_files $uri /index.php$request_uri;
        index index.php;
    }
    # FIX: Robust PHP location handler that safely parses all script routing path variations
    location ~ [^/]\.php(/|$) {
        fastcgi_split_path_info ^(.+?\.php)(/.*)$;

        # Ensure the script actually exists on disk before executing
        try_files $fastcgi_script_name =404;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_param HTTPS           on;
        fastcgi_param modHeadersAvailable true;
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_param front_controller_active true;
        fastcgi_pass php-handler;
        fastcgi_intercept_errors on;
        fastcgi_request_buffering off;
        fastcgi_connect_timeout 60s;

        # Keep your custom high-capacity buffers to prevent mismatch errors
        fastcgi_buffer_size          128k;
        fastcgi_buffers              16 256k;
        fastcgi_busy_buffers_size    512k;
    }

    # Static assets caching & fallback routing rules
    location ~ \.(?:css|js|mjs|woff2?|svg|gif|map|png|html|ttf|ico|jpg|jpeg|bcmap)$ {
        try_files $uri /index.php$request_uri;
        add_header Cache-Control "public, max-age=15778463";
        add_header X-Content-Type-Options nosniff;
        access_log off;
    }
}