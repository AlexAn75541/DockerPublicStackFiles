services:
  warp:
    image: caomingjun/warp
    container_name: warp2
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "6882:6882"           # qBittorrent TCP Torrent Port
      - "6882:6882/udp"       # qBittorrent UDP Torrent Port
      - "7878:7878"           # Radarr
      - "8989:8989"           # Sonarr
      - "9128:9128"           # Expose Host 9128 -> qBittorrent Web UI (9000)
      - "9696:9696"           # Prowlarr
      - "8191:8191"           # FlareSolverr Web API (Exposed via warp proxy)

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    network_mode: "service:warp"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - sonarr_config:/config
      - [your shit here]:/data
    restart: unless-stopped
    depends_on:
      - warp

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:warp"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - WEBUI_PORT=9128
      - TORRENTING_PORT=6882
    volumes:
      - qbittorrent_config:/config
      - [your shit here]:/data
    restart: unless-stopped
    depends_on:
      - warp

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    network_mode: "service:warp"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - radarr_config:/config
      - [your shit here]:/data
    restart: unless-stopped
    depends_on:
      - warp

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:develop
    container_name: prowlarr
    network_mode: "service:warp"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - prowlarr_config:/config
    restart: unless-stopped
    depends_on:
      - warp
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    network_mode: "service:warp"
    environment:
      - LOG_LEVEL=info
      - LOG_HTML=false
      - CAPTCHA_SOLVER=none
      - TZ=Asia/Ho_Chi_Minh
    restart: unless-stopped
    depends_on:
      - warp

volumes:
  radarr_config:
  sonarr_config:
  qbittorrent_config:
  prowlarr_config: