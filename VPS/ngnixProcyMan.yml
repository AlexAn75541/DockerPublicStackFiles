version: '3.8'

services:
  nginxproxymanager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped
    network_mode: host
    environment:
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - [your shit here]:/data
      - [your shit here]:/etc/letsencrypt
      - [your shit here]:/data/nginx/custom
